<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIND — Personal Tutoring · Map of Individual Neurocognitive Development</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta name="description" content="MIND learns how each child thinks. Generic tutoring becomes personal tutoring at scale through behavioral cognitive profiling.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">

  <!-- Styles -->
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/sections.css">
</head>
<body>

  <header class="site-header" id="site-header">
    <div class="site-header__inner">
      <a href="#hero" class="site-header__brand" aria-label="MIND home">
        <img src="assets/logo-mark.svg" alt="" class="site-header__logo" aria-hidden="true">
        <span class="site-header__wordmark">MIND</span>
      </a>
      <a href="#contact" class="site-header__cta">Let's talk →</a>
    </div>
  </header>

  <main>
    <section id="hero" class="section section--hero">
      <div class="section__inner hero__inner">
        <div class="hero__left">
          <img src="assets/logo-mark.svg" alt="" class="hero__logo" aria-hidden="true">
          <h1 class="hero__wordmark">MIND</h1>
          <div class="hero__teal-rule" aria-hidden="true"></div>
          <p class="hero__subhead">Personal Tutoring</p>
          <p class="hero__tagline">Map of Individual Neurocognitive Development</p>
        </div>
        <div class="hero__right" aria-hidden="true">
          <img src="assets/network-bg.svg" alt="" class="hero__network">
        </div>
      </div>
      <div class="hero__footer">
        <span>Denis Kravchenko · Founder</span>
        <span>April 2026</span>
      </div>
    </section>
    <section id="problem"  class="section reveal">           <div class="section__inner">PROBLEM</div></section>
    <section id="approach" class="section reveal">           <div class="section__inner">APPROACH</div></section>
    <section id="profile"  class="section reveal">           <div class="section__inner">PROFILE</div></section>
    <section id="loop"     class="section reveal">           <div class="section__inner">LOOP</div></section>
    <section id="why"      class="section reveal">           <div class="section__inner">WHY</div></section>
    <section id="market"   class="section reveal">           <div class="section__inner">MARKET</div></section>
    <section id="model"    class="section reveal">           <div class="section__inner">MODEL</div></section>
    <section id="gtm"      class="section reveal">           <div class="section__inner">GTM</div></section>
    <section id="vision"   class="section reveal">           <div class="section__inner">VISION</div></section>
    <section id="contact"  class="section reveal">           <div class="section__inner">CONTACT</div></section>
  </main>

  <footer class="site-footer">
    <div class="section__inner">MIND · April 2026</div>
  </footer>

  <script src="scripts/main.js" defer></script>
</body>
</html>
