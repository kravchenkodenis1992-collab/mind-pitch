<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <!-- Sparse cosmos-network. Lines low-opacity, nodes various sizes. One node highlighted teal. -->
  <g stroke="#3B4F7A" stroke-width="1" opacity="0.55">
    <line x1="80"  y1="100" x2="200" y2="60"/>
    <line x1="200" y1="60"  x2="320" y2="130"/>
    <line x1="320" y1="130" x2="450" y2="80"/>
    <line x1="450" y1="80"  x2="540" y2="180"/>
    <line x1="540" y1="180" x2="500" y2="300"/>
    <line x1="500" y1="300" x2="380" y2="280"/>
    <line x1="380" y1="280" x2="320" y2="130"/>
    <line x1="320" y1="130" x2="200" y2="220"/>
    <line x1="200" y1="220" x2="80"  y2="100"/>
    <line x1="80"  y1="280" x2="200" y2="220"/>
    <line x1="200" y1="220" x2="280" y2="380"/>
    <line x1="280" y1="380" x2="380" y2="280"/>
    <line x1="280" y1="380" x2="200" y2="500"/>
    <line x1="200" y1="500" x2="80"  y2="420"/>
    <line x1="80"  y1="420" x2="80"  y2="280"/>
    <line x1="380" y1="280" x2="500" y2="450"/>
    <line x1="500" y1="450" x2="380" y2="540"/>
    <line x1="380" y1="540" x2="280" y2="380"/>
    <line x1="380" y1="540" x2="200" y2="500"/>
  </g>
  <g fill="#3B4F7A">
    <circle cx="80"  cy="100" r="3"/>
    <circle cx="200" cy="60"  r="3"/>
    <circle cx="450" cy="80"  r="3"/>
    <circle cx="540" cy="180" r="3"/>
    <circle cx="500" cy="300" r="3"/>
    <circle cx="380" cy="280" r="3"/>
    <circle cx="200" cy="220" r="3"/>
    <circle cx="80"  cy="280" r="3"/>
    <circle cx="280" cy="380" r="3"/>
    <circle cx="200" cy="500" r="3"/>
    <circle cx="80"  cy="420" r="3"/>
    <circle cx="500" cy="450" r="3"/>
    <circle cx="380" cy="540" r="3"/>
  </g>
  <!-- Highlighted node (matches deck: one bright teal node, slightly larger) -->
  <circle cx="320" cy="130" r="8" fill="#2DD4BF"/>
</svg>
